name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the public source
        uses: actions/checkout@v6

      - name: Set up Lean and fetch the Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          # lean-action implements this as `lake exe cache get`.
          auto-config: false
          use-github-cache: false
          use-mathlib-cache: true

      - name: Build the library and audit assumptions
        run: ./scripts/audit-assumptions.sh

      - name: Build the Verso Blueprint
        run: ./scripts/build-blueprint.sh

      - name: Assemble the Pages site
        run: |
          mkdir -p _site/blueprint
          rsync -a _out/blueprint/ _site/blueprint/
          cp pages/index.html _site/index.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
